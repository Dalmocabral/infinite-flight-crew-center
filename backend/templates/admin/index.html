{% extends "admin/index.html" %}
{% load static admin_dashboard_tags %}

{% block content %}
<div class="row" style="margin-bottom: 30px;">
    <div class="col-md-12">
        <div class="card card-primary card-outline">
            <div class="card-header">
                <h3 class="card-title">Flight Statistics</h3>
            </div>
            <div class="card-body">
                <canvas id="flightStatsChart" style="min-height: 250px; height: 250px; max-height: 400px; max-width: 100%;"></canvas>
            </div>
        </div>
    </div>
</div>

{{ block.super }}

{% get_pirep_stats as stats %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        var ctx = document.getElementById('flightStatsChart').getContext('2d');
        var stats = {{ stats|as_json|safe }};

        var flightStatsChart = new Chart(ctx, {
            type: 'bar', // or 'pie', 'doughnut'
            data: {
                labels: ['Approved', 'In Review', 'Rejected'],
                datasets: [{
                    label: 'Flight Status',
                    data: [stats.approved, stats.in_review, stats.rejected],
                    backgroundColor: [
                        'rgba(46, 204, 113, 0.8)', // Green
                        'rgba(241, 196, 15, 0.8)', // Yellow
                        'rgba(231, 76, 60, 0.8)'   // Red
                    ],
                    borderColor: [
                        'rgba(46, 204, 113, 1)',
                        'rgba(241, 196, 15, 1)',
                        'rgba(231, 76, 60, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            color: '#fff' // For dark theme readability
                        },
                        grid: {
                            color: 'rgba(255, 255, 255, 0.1)'
                        }
                    },
                    x: {
                        ticks: {
                            color: '#fff'
                        },
                        grid: {
                            color: 'rgba(255, 255, 255, 0.1)'
                        }
                    }
                },
                plugins: {
                    legend: {
                        labels: {
                            color: '#fff'
                        }
                    }
                }
            }
        });
    });
</script>
{% endblock %}
